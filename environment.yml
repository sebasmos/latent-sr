name: medvae-sr
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11

  # PyTorch with CUDA 12.1 support
  - pytorch=2.5.0
  - torchvision=0.20.0
  - pytorch-cuda=12.1
  - cudatoolkit=12.1

  # Core scientific computing
  - numpy=2.2.5
  - scipy=1.13.1
  - pandas=2.2.3
  - scikit-learn=1.6.1
  - scikit-image=0.24.0

  # Image processing
  - pillow=11.2.1
  - opencv=4.10.0
  - matplotlib=3.10.1
  - seaborn=0.13.2
  - imagecodecs

  # Medical imaging
  - nibabel
  - simpleitk=2.4.1
  - nilearn

  # Deep learning utilities
  - tqdm=4.67.1
  - omegaconf=2.3.0
  - hydra-core=1.3.2
  - einops=0.8.1
  - yacs

  # Jupyter (optional, for notebooks)
  - jupyter
  - ipykernel

  # Development tools
  - pip
  - git

  # Install via pip (packages not available in conda or requiring specific versions)
  - pip:
      # PyTorch ecosystem
      - accelerate==1.7.0
      - torchmetrics==1.7.2
      - torch-fidelity==0.3.0

      # Diffusion models
      - diffusers==0.33.1

      # Transformers
      - transformers==4.52.4

      # Medical imaging specific
      - monai==1.4.0
      - dicom2nifti==2.5.1
      - batchgenerators==0.25.1
      - batchgeneratorsv2==0.2.3

      # Real-ESRGAN dependencies
      - basicsr==1.4.2
      - facexlib==0.2.5
      - gfpgan==1.3.5

      # Experiment tracking
      - wandb==0.18.0

      # Utilities
      - pyrootutils==1.0.4
      - hydra-colorlog==1.2.0
      - rich==13.9.4
      - gdown==5.2.0
      - requests==2.32.3
      - polars==0.19.10

      # CLIP
      - open_clip_torch==2.24.0
      - clip@git+https://github.com/openai/CLIP.git
